<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tempo — Music Practice Tracker</title>
    <meta
      name="description"
      content="Track your music practice sessions. Visualize your progress with animated charts — all stored locally in your browser."
    />
    <meta name="theme-color" content="#0D0F14" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/visualizations.css" />
    <link rel="stylesheet" href="css/log.css" />
    <link rel="stylesheet" href="css/stats.css" />

    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <a class="skip-nav" href="#main">Skip to main content</a>

    <header class="app-header">
      <div class="app-header__inner">
        <a href="#" class="app-header__wordmark" aria-label="Tempo home">
          <span aria-hidden="true">♩</span> Tempo
        </a>
        <nav class="app-nav" aria-label="App sections">
          <button
            class="app-nav__btn app-nav__btn--active"
            data-view="week"
            type="button"
            aria-current="page"
          >
            Week
          </button>
          <button class="app-nav__btn" data-view="year" type="button">Year</button>
          <button class="app-nav__btn" data-view="log" type="button">Log</button>
          <button class="app-nav__btn" data-view="stats" type="button">Stats</button>
        </nav>
      </div>
    </header>

    <main id="main" tabindex="-1">
      <!-- ── Week view: radial burst ── -->
      <section id="view-week" class="view view--week" aria-labelledby="week-heading">
        <div class="view__header">
          <h2 id="week-heading" class="view__title">This Week</h2>
          <div class="week-nav" role="group" aria-label="Week navigation">
            <button id="week-prev" class="week-nav__btn" type="button" aria-label="Previous week">
              <span data-lucide="chevron-left" aria-hidden="true"></span>
            </button>
            <span id="week-label" class="week-nav__label" aria-live="polite"></span>
            <button id="week-next" class="week-nav__btn" type="button" aria-label="Next week">
              <span data-lucide="chevron-right" aria-hidden="true"></span>
            </button>
            <button
              id="week-today"
              class="week-nav__btn"
              type="button"
              aria-label="Jump to current week"
              hidden
            >
              <span data-lucide="calendar" aria-hidden="true"></span>
            </button>
          </div>
        </div>

        <div class="canvas-wrapper" id="radial-wrapper">
          <canvas
            id="radial-canvas"
            role="img"
            aria-label="Loading week visualization…"
            width="320"
            height="320"
          ></canvas>
          <div id="radial-tooltip" class="canvas-tooltip" role="tooltip" aria-hidden="true"></div>
          <div id="radial-overlay" class="canvas-overlay" role="group" aria-label="Week days"></div>
        </div>

        <div id="radial-summary" class="visually-hidden" aria-live="polite"></div>
      </section>

      <!-- ── Year view: contribution grid ── -->
      <section id="view-year" class="view view--year" aria-labelledby="year-heading" hidden>
        <div class="view__header">
          <h2 id="year-heading" class="view__title">This Year</h2>
        </div>

        <div class="grid-scroll">
          <div class="canvas-wrapper canvas-wrapper--grid" id="grid-wrapper">
            <canvas
              id="grid-canvas"
              role="img"
              aria-label="Loading year visualization…"
              width="742"
              height="122"
            ></canvas>
            <div id="grid-tooltip" class="canvas-tooltip" role="tooltip" aria-hidden="true"></div>
            <div id="grid-overlay" class="canvas-overlay" role="group" aria-label="Year days"></div>
          </div>
        </div>

        <div id="grid-summary" class="visually-hidden" aria-live="polite"></div>
      </section>

      <!-- ── Log view: session form + list ── -->
      <section id="view-log" class="view view--log" aria-labelledby="log-heading" hidden>
        <div class="view__header">
          <h2 id="log-heading" class="view__title">Log Session</h2>
        </div>

        <div class="log-layout">
          <div class="log-form-panel">
            <form id="log-form" class="log-form" novalidate>
              <div class="form-field">
                <label class="form-label" for="field-date">Date</label>
                <input
                  class="form-input"
                  id="field-date"
                  name="date"
                  type="date"
                  aria-describedby="field-date-error"
                  required
                />
                <span
                  class="form-error"
                  id="field-date-error"
                  role="alert"
                  aria-live="polite"
                ></span>
              </div>

              <div class="form-field">
                <label class="form-label" for="field-instrument">Instrument</label>
                <select
                  class="form-input form-input--select"
                  id="field-instrument"
                  name="instrument"
                  aria-describedby="field-instrument-error"
                  required
                >
                  <option value="">Select instrument…</option>
                  <option value="guitar">Guitar</option>
                  <option value="piano">Piano</option>
                  <option value="bass">Bass</option>
                  <option value="drums">Drums</option>
                  <option value="violin">Violin</option>
                  <option value="cello">Cello</option>
                  <option value="flute">Flute</option>
                  <option value="vocals">Vocals</option>
                  <option value="voice">Voice</option>
                  <option value="other">Other</option>
                </select>
                <span
                  class="form-error"
                  id="field-instrument-error"
                  role="alert"
                  aria-live="polite"
                ></span>
              </div>

              <div class="form-field" id="field-instrument-custom-wrap" hidden>
                <label class="form-label" for="field-instrument-custom">Instrument name</label>
                <input
                  class="form-input"
                  id="field-instrument-custom"
                  name="instrumentCustom"
                  type="text"
                  placeholder="e.g. banjo, ukulele, recorder"
                  maxlength="60"
                  aria-describedby="field-instrument-custom-error"
                />
                <span
                  class="form-error"
                  id="field-instrument-custom-error"
                  role="alert"
                  aria-live="polite"
                ></span>
              </div>

              <div class="form-field">
                <label class="form-label" for="field-duration">Duration (minutes)</label>
                <input
                  class="form-input form-input--mono"
                  id="field-duration"
                  name="duration"
                  type="number"
                  min="1"
                  max="480"
                  placeholder="30"
                  aria-describedby="field-duration-error"
                  required
                />
                <span
                  class="form-error"
                  id="field-duration-error"
                  role="alert"
                  aria-live="polite"
                ></span>
              </div>

              <div class="form-field">
                <label class="form-label" for="field-focus">Focus area</label>
                <input
                  class="form-input"
                  id="field-focus"
                  name="focusArea"
                  type="text"
                  placeholder="e.g. scales, sight-reading, repertoire"
                  maxlength="120"
                  aria-describedby="field-focus-hint"
                />
                <span class="form-hint" id="field-focus-hint"
                  >Optional — what did you work on?</span
                >
              </div>

              <div class="form-actions">
                <button class="btn btn--primary" id="log-submit" type="submit">
                  <span data-lucide="plus" aria-hidden="true"></span>
                  Log session
                </button>
                <button class="btn btn--ghost" id="log-cancel" type="button" hidden>
                  Cancel edit
                </button>
              </div>
            </form>
          </div>

          <div class="log-list-panel">
            <div class="session-list-header">
              <label class="form-label" for="filter-instrument">Filter</label>
              <select class="form-input form-input--select form-input--sm" id="filter-instrument">
                <option value="">All instruments</option>
              </select>
            </div>

            <div id="session-list" class="session-list" aria-live="polite">
              <!-- rendered by log.js -->
            </div>
          </div>
        </div>
      </section>

      <!-- ── Stats view ── -->
      <section id="view-stats" class="view view--stats" aria-labelledby="stats-heading" hidden>
        <div class="view__header">
          <h2 id="stats-heading" class="view__title">Stats</h2>
          <button
            class="btn btn--ghost btn--sm"
            id="export-btn"
            type="button"
            aria-label="Export all session data as JSON"
          >
            <span data-lucide="download" aria-hidden="true"></span>
            Export JSON
          </button>
        </div>

        <div id="stats-live" class="visually-hidden" role="status" aria-live="polite"></div>

        <div id="stats-content" class="stats-grid">
          <!-- rendered by stats.js -->
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p class="app-footer__text">
        All data stored locally in your browser.
        <span class="app-footer__separator" aria-hidden="true">·</span>
        No accounts, no tracking.
      </p>
    </footer>

    <!-- CDN dependencies — synchronous, no defer, must load before app scripts -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- App scripts — classic scripts in dependency order -->
    <script defer src="js/db.js"></script>
    <script defer src="js/utils.js"></script>
    <script defer src="js/log.js"></script>
    <script defer src="js/radial.js"></script>
    <script defer src="js/grid.js"></script>
    <script defer src="js/stats.js"></script>
    <script defer src="js/main.js"></script>
  </body>
</html>
