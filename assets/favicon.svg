<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0D0F14"/>
  <!-- Metronome pendulum -->
  <line x1="16" y1="6" x2="10" y2="26" stroke="#7B5EA7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Metronome body -->
  <polygon points="8,28 24,28 20,10 12,10" fill="none" stroke="#7B5EA7" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Beat dot -->
  <circle cx="10" cy="26" r="2.5" fill="#E8714A"/>
</svg>
